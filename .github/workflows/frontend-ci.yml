name: Frontend CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/frontend1/package-lock.json

      - name: Install
        working-directory: frontend/frontend1
        run: npm ci

      - name: Build
        working-directory: frontend/frontend1
        run: npm run build

      - name: Test
        working-directory: frontend/frontend1
        run: npm run test
