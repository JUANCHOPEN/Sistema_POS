name: Backend CI

on:
  pull_request:
  push:
    branches:
      - main
      - feature/backend-william

jobs:
  backend-build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python syntax
        working-directory: backend
        run: |
          python -m compileall .

      - name: Verify FastAPI import
        working-directory: backend
        run: |
          python -c "from main import app; print('Backend FastAPI importado correctamente')"
